<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Grass</title>

    <!-- js-dos Stylesheet -->
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <!-- js-dos Library -->
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        #dos {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- The container where the emulator will appear -->
    <div id="dos"></div>

    <script>
        // Initialize js-dos and run my file
        Dos(document.getElementById("dos")).run("DigitalGrass.jsdos");
    </script>

</body>
</html>
