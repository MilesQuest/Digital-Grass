<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Load the official js-dos CSS style rules -->
    <link href="https://js-dos.com" rel="stylesheet">
    <!-- Load the official js-dos engine script -->
    <script src="https://js-dos.com"></script>
    <style>
        html, body, #jsdos {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
        }
    </style>
</head>
<body>
    <!-- This is the container where Digital Grass displays -->
    <div id="jsdos"></div>

    <script>
        // Set the path prefix so js-dos can find its internal emulation files
        emulators.pathPrefix = "https://js-dos.com";
        
        Dos(document.getElementById("jsdos")).run("DigitalGrass.jsdos");
    </script>
</body>
</html>
